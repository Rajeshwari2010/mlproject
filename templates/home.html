<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0f2f4, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            width: 100%;
            max-width: 700px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-header {
            background: #a397ed;
            color: white;
            text-align: center;
            border-radius: 20px 20px 0 0 !important;
            padding: 20px;
        }

        .card-header h2 {
            margin: 0;
            font-weight: bold;
        }

        .form-label {
            font-weight: 600;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
        }

        .prediction-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-left: 6px solid green;
            border-radius: 10px;
            text-align: center;
        }

        h3 {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="card-header">
            <h2><i class="bi bi-mortarboard-fill"></i> Student Exam Performance Predictor</h2>
            <p class="mb-0">Predict Mathematics Score using Machine Learning</p>
        </div>

        <div class="card-body p-4">

            <form action="{{ url_for('predict_datapoint') }}" method="post">

                <div class="row">

                    <!-- Gender -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option selected disabled>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <!-- Ethnicity -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Race / Ethnicity</label>
                        <select class="form-select" name="ethnicity" required>
                            <option selected disabled>Select Group</option>
                            <option value="group A">Group A</option>
                            <option value="group B">Group B</option>
                            <option value="group C">Group C</option>
                            <option value="group D">Group D</option>
                            <option value="group E">Group E</option>
                        </select>
                    </div>

                    <!-- Parent Education -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Parental Education</label>
                        <select class="form-select" name="parental_level_of_education" required>
                            <option selected disabled>Select Education</option>
                            <option value="associate's degree">Associate's Degree</option>
                            <option value="bachelor's degree">Bachelor's Degree</option>
                            <option value="high school">High School</option>
                            <option value="master's degree">Master's Degree</option>
                            <option value="some college">Some College</option>
                            <option value="some high school">Some High School</option>
                        </select>
                    </div>

                    <!-- Lunch -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Lunch Type</label>
                        <select class="form-select" name="lunch" required>
                            <option selected disabled>Select Lunch Type</option>
                            <option value="standard">Standard</option>
                            <option value="free/reduced">Free / Reduced</option>
                        </select>
                    </div>

                    <!-- Test Preparation -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Test Preparation Course</label>
                        <select class="form-select" name="test_preparation_course" required>
                            <option selected disabled>Select Option</option>
                            <option value="completed">Completed</option>
                            <option value="none">None</option>
                        </select>
                    </div>

                    <!-- Reading -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Reading Score</label>
                        <input type="number"
                               class="form-control"
                               name="reading_score"
                               placeholder="Enter Reading Score"
                               min="0"
                               max="100"
                               required>
                    </div>

                    <!-- Writing -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Writing Score</label>
                        <input type="number"
                               class="form-control"
                               name="writing_score"
                               placeholder="Enter Writing Score"
                               min="0"
                               max="100"
                               required>
                    </div>

                </div>

                <div class="d-grid mt-3">
                    <button class="btn btn-primary btn-lg">
                        <i class="bi bi-graph-up-arrow"></i>
                        Predict Maths Score
                    </button>
                </div>

            </form>

            {% if results %}
            <div class="prediction-box">
                <h5>Predicted Mathematics Score</h5>
                <h3>{{ results }}</h3>
            </div>
            {% endif %}

        </div>

    </div>
</div>

</body>
</html>
